<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carregando portal — 1º Semestre</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a2e;
    }
    .logo {
      background: #c8102e;
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      padding: .45rem .9rem;
      border-radius: 4px;
      margin-bottom: 1.2rem;
      letter-spacing: .04em;
    }
    h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: .4rem; }
    p  { font-size: .85rem; color: #666; margin-bottom: 1.5rem; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #c8102e;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">SENAI</div>
  <h1>Técnico em Desenvolvimento de Sistemas</h1>
  <p>Abrindo portal do 1º Semestre...</p>
  <div class="spinner"></div>
  <script>
    // Redireciona para o portal com o semestre correto
    // Funciona tanto local (file://) quanto GitHub Pages
    var base = window.location.href.replace("semestre-1.html", "index.html");
    window.location.replace(base + "?sem=1");
  </script>
</body>
</html>
